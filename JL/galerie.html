<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galerie - JL Střechy</title>
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="style/main.css">
  <link rel="stylesheet" href="site.css">
</head>
<body class="ultra-cursor">
  <div class="container">
    <div class="topbar"><a class="brand" href="index.html"><div class="brand-mark"><img src="images/logo/logo.jpg" alt="JL Střechy logo"></div><div>JL STŘECHY</div></a><div class="menu"><a href="index.html">Úvod</a><a href="o-nas.html">O nás</a><a href="sluzby.html">Služby</a><a href="pro-firmy.html">Pro firmy</a><a href="pro-pracovniky.html">Pro pracovníky</a><a href="galerie.html">Galerie</a><a href="index.html#kontakt">Kontakt</a><a href="admin-login.html">Admin</a><button class="toggle-theme" type="button">🌗</button></div></div>
    <main class="page-shell">
      <section class="gallery-hero once-surface">
        <div>
          <h1>Galerie</h1>
          <p>Přehled realizací ve stylu Once UI: surface karty, hover reveal, filtry a jemné scale/blur animace.</p>
        </div>
        <div class="gallery-toolbar" aria-label="Ovládání galerie">
          <div class="gallery-filters" data-gallery-filters>
            <button class="is-active" type="button" data-filter="all">Vše</button>
            <button type="button" data-filter="střech">Střechy</button>
            <button type="button" data-filter="pergola">Pergoly</button>
            <button type="button" data-filter="dřev">Dřevostavby</button>
          </div>
          <div class="gallery-view">
            <button class="is-active" type="button" data-gallery-view="grid">Grid</button>
            <button type="button" data-gallery-view="compact">Compact</button>
          </div>
        </div>
      </section>
      <section class="project-grid once-gallery" data-project-grid></section>
    </main>
  </div>
  <script src="projects-data.js"></script><script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script><script src="js/main.js"></script><script src="site.js"></script><script>AOS.init({ duration: 900, once: true, offset: 80 });</script>
</body>
</html>
